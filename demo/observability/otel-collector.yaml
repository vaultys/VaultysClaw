# OpenTelemetry Collector — VaultysClaw demo
#
# Receives OTLP from the host (control plane / agents) on :4317 (gRPC) and
# :4318 (HTTP), both port-mapped to localhost.
# Forwards to Tempo and Prometheus using Docker container-name DNS on the
# vc-demo-obs network (avoids host.docker.internal IPv6 issues with gRPC).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 256

  resource:
    attributes:
      - action: insert
        key: demo
        value: "vaultysclaw"

exporters:
  otlp/tempo:
    endpoint: vc-demo-tempo:4317    # container-name DNS on vc-demo-obs network
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://vc-demo-prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  prometheus:
    endpoint: 0.0.0.0:8888          # internal health metrics

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheusremotewrite]
