apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://vc-demo-prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://vc-demo-tempo:3200
    jsonData:
      tracesToMetricsV2:
        datasourceUid: prometheus
        queries:
          - name: Request rate
            query: 'sum(rate(http_server_request_duration_seconds_count{$__tags}[5m]))'
          - name: Error rate
            query: 'sum(rate(http_server_request_duration_seconds_count{$__tags,http_response_status_code=~"5.."}[5m]))'
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: ""
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
      spanBar:
        type: Duration
