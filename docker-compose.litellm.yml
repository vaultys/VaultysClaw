services:
  # ------------------------------------------------------------------
  # Mock LiteLLM proxy — lightweight Node.js stub, no Python required
  # ------------------------------------------------------------------
  mock-litellm:
    build:
      context: docker/mock-litellm
    ports:
      - "14000:4000"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "
            const http = require('http');
            http.get('http://localhost:4000/health/liveliness', r =>
              process.exit(r.statusCode === 200 ? 0 : 1)
            ).on('error', () => process.exit(1));
          "
      interval: 2s
      timeout: 3s
      retries: 15

  # ------------------------------------------------------------------
  # Mock OpenAI-compatible LLM (same as main test stack)
  # ------------------------------------------------------------------
  mock-llm:
    build:
      context: docker/mock-llm
    ports:
      - "11435:11435"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "
            const http = require('http');
            http.get('http://localhost:11435/health', r =>
              process.exit(r.statusCode === 200 ? 0 : 1)
            ).on('error', () => process.exit(1));
          "
      interval: 2s
      timeout: 3s
      retries: 15

  # ------------------------------------------------------------------
  # Control plane — LiteLLM configured to use the mock proxy
  # ------------------------------------------------------------------
  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    ports:
      - "13000:3000"
      - "18080:8080"
    depends_on:
      mock-litellm:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    environment:
      NODE_ENV: development
      ENABLE_TEST_API: "true"
      NEXTAUTH_SECRET: "vaultysclaw-litellm-test-secret"
      NEXTAUTH_URL: "http://localhost:13000"
      PORT: "3000"
      WS_PORT: "8080"
      # LiteLLM integration
      LITELLM_BASE_URL: "http://mock-litellm:4000"
      LITELLM_MASTER_KEY: "sk-litellm-test-master"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3000/api/server || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ------------------------------------------------------------------
  # Agent controller
  # ------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent-controller
    depends_on:
      control-plane:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    environment:
      CONTROL_PLANE_WS_URL: "ws://control-plane:8080"
      CONTROL_PLANE_URL: "http://control-plane:3000"
      AGENT_NAME: "litellm-test-agent"
      VAULTYS_ID_PATH: "/data/agent.id"
      AGENT_CAPABILITIES: "test_capability,llm_query"
      LLM_PROVIDER: "openai-compatible"
      LLM_MODEL: "mock-model"
      LLM_BASE_URL: "http://mock-llm:11435/v1"
      LLM_API_KEY: "not-needed"
    volumes:
      - agent_data_litellm:/data
    restart: on-failure

volumes:
  agent_data_litellm:
