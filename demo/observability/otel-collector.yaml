# OpenTelemetry Collector — VaultysClaw demo
#
# Receives OTLP from the control plane and agents (gRPC :4317 / HTTP :4318),
# fans out:
#   traces  → Tempo   (via OTLP gRPC)
#   metrics → Prometheus (via remote-write)
#
# All backend addresses use Docker container names on the vc-demo-obs network.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 256

  # Add resource attributes as metric labels
  resource:
    attributes:
      - action: insert
        key: demo
        value: "vaultysclaw"

exporters:
  otlp/tempo:
    endpoint: vc-demo-tempo:4317
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://vc-demo-prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true   # surface service.name etc. as prometheus labels

  # Internal collector health metrics
  prometheus:
    endpoint: 0.0.0.0:8888

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheusremotewrite]
