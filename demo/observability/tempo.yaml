# Grafana Tempo — VaultysClaw demo
# All-in-one single-binary mode, local filesystem storage.
# Tested against grafana/tempo:latest (3.x).

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Generates service-graph + span-metrics from traces, pushed to Prometheus
# so Grafana's Service Map panel works.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://vc-demo-prometheus:9090/api/v1/write   # container-name DNS on vc-demo-obs network

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
