<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>

  <!-- Antenna stem -->
  <line x1="20" y1="1.5" x2="20" y2="5.5" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="20" cy="1.5" r="1.5" fill="#93c5fd"/>

  <!-- Shield body -->
  <path d="M20,5.5 L33.5,11 L33.5,23.5 C33.5,31.5 27.5,36.5 20,39 C12.5,36.5 6.5,31.5 6.5,23.5 L6.5,11 Z"
        fill="url(#shield-grad)"/>

  <!-- Inner shield border -->
  <path d="M20,8.5 L31,13 L31,22.5 C31,28.5 26.5,33 20,35.5 C13.5,33 9,28.5 9,22.5 L9,13 Z"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>

  <!-- Left eye -->
  <circle cx="15" cy="19" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="15" cy="19" r="2" fill="#1d4ed8"/>
  <circle cx="15.9" cy="18.1" r="0.75" fill="white"/>

  <!-- Right eye -->
  <circle cx="25" cy="19" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="25" cy="19" r="2" fill="#1d4ed8"/>
  <circle cx="25.9" cy="18.1" r="0.75" fill="white"/>

  <!-- Mouth bar -->
  <rect x="13.5" y="26" width="13" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
  <line x1="17.8" y1="26" x2="17.8" y2="28.5" stroke="rgba(96,165,250,0.5)" stroke-width="0.8"/>
  <line x1="22.2" y1="26" x2="22.2" y2="28.5" stroke="rgba(96,165,250,0.5)" stroke-width="0.8"/>
</svg>
